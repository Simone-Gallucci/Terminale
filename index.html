<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Terminale Hack</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      color: #00ff00;
      font-family: monospace;
      height: 100%;
      overflow: hidden;
    }

    #terminal {
      padding: 10px;
      height: calc(100vh - 40px);
      overflow-y: auto;
      white-space: pre-wrap;
    }

    #input-line {
      display: flex;
      padding: 5px 10px;
      background-color: #000;
      border-top: 1px solid #0f0;
    }

    #prompt {
      flex-shrink: 0;
      white-space: nowrap;
    }

    #command {
      background: black;
      color: #00ff00;
      border: none;
      outline: none;
      flex-grow: 1;
      font-family: monospace;
      font-size: 1em;
    }

    #command::placeholder {
      color: #0f0;
    }

    #editor {
      position: fixed;
      top: 5%;
      left: 5%;
      width: 90%;
      height: 85%;
      background: #111;
      color: #0f0;
      display: none;
      border: 2px solid #0f0;
      padding: 10px;
      box-sizing: border-box;
      z-index: 100;
    }

    #editor textarea {
      width: 100%;
      height: 75%;
      background: black;
      color: #00ff00;
      border: none;
      font-family: monospace;
      font-size: 1em;
      resize: none;
    }

    #editor button {
      margin-right: 10px;
      padding: 5px 10px;
      background: black;
      color: #00ff00;
      border: 1px solid #0f0;
      cursor: pointer;
      font-family: monospace;
    }

    #editor button:hover {
      background: #0f0;
      color: black;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <div id="input-line">
    <span id="prompt"></span>
    <input type="text" id="command" placeholder="Scrivi un comando..." autofocus autocomplete="off" />
  </div>

  <div id="editor">
    <h3>Editor</h3>
    <textarea id="editor-content"></textarea><br>
    <button onclick="saveFile()">Salva</button>
    <button onclick="closeEditor()">Chiudi</button>
  </div>

  <script src="filesystem.js"></script>
</body>
</html>

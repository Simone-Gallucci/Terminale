<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminale Linux Web</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
  <script src="terminal.js" defer></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      color: limegreen;
      font-family: monospace;
      overflow: hidden;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 1em;
      box-sizing: border-box;
    }
    .output-area {
      flex: 1;
      overflow-y: auto;
      white-space: pre-wrap;
      margin-bottom: 1em;
    }
    .prompt {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      background: #111;
      padding: 0.5em;
      border-top: 1px solid #0f0;
    }
    .prompt span {
      margin-right: 0.5em;
    }
    input {
      background: none;
      border: none;
      color: inherit;
      font: inherit;
      outline: none;
      flex: 1;
      min-width: 50px;
    }
    .editor-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1em;
      box-sizing: border-box;
    }
    textarea {
      width: 100%;
      max-width: 600px;
      height: 60%;
      background: #111;
      color: #0f0;
      border: 2px solid #0f0;
      padding: 1em;
      font-family: monospace;
      font-size: 1em;
      resize: none;
    }
    button {
      margin-top: 10px;
      padding: 0.5em 2em;
      font-family: monospace;
      font-size: 1em;
      background: #0f0;
      color: black;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="output-area" ref="outputArea">
      <div class="output" v-for="line in output">{{ line }}</div>
    </div>
    <div class="prompt">
      <span>{{ prompt }}</span>
      <input v-model="input" @keyup.enter="handleCommand" autocomplete="off" />
    </div>

    <!-- Editor -->
    <div v-if="showEditor" class="editor-overlay">
      <textarea v-model="editorContent"></textarea>
      <button @click="saveEditor">Salva</button>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Termux Web Clone - Input in alto</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
  <script src="terminal.js" defer></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      color: limegreen;
      font-family: monospace;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-height: 100dvh;
    }
    .prompt-bar {
      display: flex;
      align-items: center;
      background: #111;
      padding: 0.5em;
      border-bottom: 1px solid #0f0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .prompt-bar span {
      margin-right: 0.5em;
      font-weight: bold;
    }
    .prompt-bar input {
      flex: 1;
      background: none;
      border: none;
      color: inherit;
      font: inherit;
      font-size: 1em;
      outline: none;
    }
    .output-area {
      flex: 1;
      overflow-y: auto;
      padding: 1em;
      white-space: pre-wrap;
    }
    .editor-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1em;
      z-index: 999;
    }
    .editor-overlay textarea {
      width: 100%;
      height: 70%;
      max-height: 80%;
      background: #111;
      color: #0f0;
      border: 2px solid #0f0;
      font-family: monospace;
      font-size: 1em;
      padding: 1em;
      resize: none;
    }
    .editor-overlay button {
      margin-top: 1em;
      font-size: 1em;
      font-family: monospace;
      padding: 0.5em 2em;
      background: #0f0;
      color: black;
      border: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- PROMPT IN ALTO -->
    <div class="prompt-bar">
      <span>{{ prompt }}</span>
      <input v-model="input" @keyup.enter="handleCommand" ref="inputField" />
    </div>

    <!-- OUTPUT -->
    <div class="output-area" ref="outputArea">
      <div class="output" v-for="line in output">{{ line }}</div>
    </div>

    <!-- EDITOR -->
    <div v-if="showEditor" class="editor-overlay">
      <textarea v-model="editorContent"></textarea>
      <button @click="saveEditor">Salva</button>
    </div>
  </div>
</body>
</html>

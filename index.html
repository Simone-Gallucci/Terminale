<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Terminale Linux Web</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
  <script src="terminal.js" defer></script>
  <style>
    body {
      background: black;
      color: limegreen;
      font-family: monospace;
      margin: 0;
      padding: 1em;
    }
    input {
      background: none;
      border: none;
      color: inherit;
      font: inherit;
      outline: none;
      flex: 1;
    }
    .output {
      white-space: pre-wrap;
    }
    .prompt {
      display: flex;
      flex-wrap: wrap;
    }
    .editor-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    textarea {
      width: 80%;
      height: 60%;
      background: #111;
      color: #0f0;
      border: 2px solid #0f0;
      padding: 1em;
      font-family: monospace;
      font-size: 1em;
    }
    button {
      margin-top: 10px;
      padding: 0.5em 2em;
      font-family: monospace;
      font-size: 1em;
      background: #0f0;
      color: black;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="output" v-for="line in output">{{ line }}</div>
    <div class="prompt">
      <span>{{ prompt }}</span>
      <input v-model="input" @keyup.enter="handleCommand" autofocus />
    </div>

    <!-- Editor -->
    <div v-if="showEditor" class="editor-overlay">
      <textarea v-model="editorContent"></textarea>
      <button @click="saveEditor">Salva</button>
    </div>
  </div>
</body>
</html>
